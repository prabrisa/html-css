<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 150px;
        }
        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            color: rosybrown;
        }

        div:hover {
            color: royalblue;
        }

        /*
        Hover => quando passar o mouse
        display: none => esconde o elemento
        display: block => mostra o elemento
        div > p => seleciona o elemento p que é filho direto do elemento div
        */
    </style>
</head>
<body>
    <h1>Exempo de hover</h1>
    <p>Passe o mouse sobre o texto abaixo</p>
    <div>
        Passe o mouse aqui
        <p>Texto escondido</p>
    </div>
</body>
</html>
