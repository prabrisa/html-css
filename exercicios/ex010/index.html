<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Trabalhando com listas</h1>
    <h2>Listas Ordenadas</h2>
    <ol type="I"> 
        <li>acordar</li>
        <li>escovar dente</li>
        <li>tomar banho</li>
        <li>estudar</li>
        <li>comer</li>
    </ol>
    <h2>Listas nao-ordenadas</h2>
    <ul type="square">
        <li>pao</li>
        <li>manteiga</li>
        <li>mussarela</li>
    </ul>
</body>
</html>
